<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CROW T. ROBOT — Satellite of Love</title>
<style>
  :root{
    --space:#07090f; --wall:#10141f; --panel:#161b29;
    --brass:#d4a017; --brass-hi:#f5cf5a; --brass-lo:#7a5c0e;
    --amber:#ffb347; --lamp:#ff4a3d; --lamp-ok:#7dd87d;
    --text:#e8dcbf; --dim:#8d8468;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--space);
    color:var(--text);
    font-family:"Courier New", ui-monospace, monospace;
    overflow:hidden;
  }

  /* ---- the set ---- */
  #stage{position:fixed; inset:0;}
  #stars{position:absolute; inset:0; width:100%; height:100%;}
  #wall{
    position:absolute; inset:0;
    background:
      radial-gradient(1200px 700px at 50% 115%, rgba(212,160,23,.10), transparent 60%),
      radial-gradient(900px 500px at 50% -10%, rgba(30,40,70,.55), transparent 70%);
    pointer-events:none;
  }
  /* hex viewport window behind crow */
  #porthole{
    position:absolute; left:50%; top:44%;
    width:min(78vmin,760px); height:min(78vmin,760px);
    transform:translate(-50%,-50%);
    clip-path:polygon(25% 3%, 75% 3%, 98% 50%, 75% 97%, 25% 97%, 2% 50%);
    background:linear-gradient(180deg, rgba(15,22,40,.35), rgba(5,7,12,.15));
    box-shadow:inset 0 0 90px rgba(0,0,0,.9);
    border:1px solid rgba(212,160,23,.18);
  }

  #crowWrap{
    position:absolute; left:50%; top:45%;
    transform:translate(-50%,-50%);
    width:min(62vmin,580px);
  }
  #crowWrap svg{width:100%; height:auto; display:block;
    filter:drop-shadow(0 18px 40px rgba(0,0,0,.75));}

  /* ---- cardboard cutout gag ---- */
  #cutout{
    position:fixed; right:4vw; bottom:-46vh; width:22vmin; min-width:150px;
    transition:bottom 1.1s cubic-bezier(.2,.9,.3,1.05);
    transform-origin:bottom center;
    pointer-events:none; z-index:3;
  }
  #cutout.up{bottom:-4vh; animation:wobble 2.6s ease-in-out infinite;}
  @keyframes wobble{0%,100%{rotate:-2deg}50%{rotate:2.5deg}}
  #cutout .label{
    position:absolute; top:8%; left:-12%;
    background:#e8dcbf; color:#221c10; font-size:11px; letter-spacing:1px;
    padding:2px 6px; rotate:-7deg; box-shadow:0 2px 5px rgba(0,0,0,.5);
  }

  /* ---- console ---- */
  #console{
    position:fixed; left:0; right:0; bottom:0; z-index:5;
    display:flex; gap:16px; align-items:flex-end;
    padding:14px 18px 16px;
    background:linear-gradient(180deg, transparent, rgba(7,9,15,.92) 30%);
  }
  #readout{flex:1; min-width:0;}
  #statusRow{display:flex; align-items:center; gap:9px; margin-bottom:8px;}
  #lamp{width:11px; height:11px; border-radius:50%;
    background:var(--lamp); box-shadow:0 0 10px var(--lamp);
    transition:background .3s, box-shadow .3s;}
  #lamp.ok{background:var(--lamp-ok); box-shadow:0 0 10px var(--lamp-ok);}
  #lamp.busy{background:var(--amber); box-shadow:0 0 12px var(--amber);
    animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{50%{opacity:.35}}
  #status{font-size:13px; letter-spacing:2px; text-transform:uppercase; color:var(--dim);}
  .line{font-size:15px; line-height:1.45; white-space:pre-wrap; word-wrap:break-word;
    max-height:3.1em; overflow:hidden;}
  .line .who{color:var(--dim); letter-spacing:1px;}
  #lineCrow{color:var(--brass-hi); min-height:1.4em;}
  #lineYou{color:var(--text); opacity:.85;}

  #controls{display:flex; gap:10px; align-items:center; flex-shrink:0;}
  button{
    font-family:inherit; font-size:13px; letter-spacing:2px;
    color:var(--text); background:var(--panel);
    border:1px solid rgba(212,160,23,.45); border-radius:4px;
    padding:10px 16px; cursor:pointer;
  }
  button:hover{border-color:var(--brass-hi); color:var(--brass-hi);}
  button:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}
  #power.on{background:rgba(212,160,23,.18); color:var(--brass-hi);
    border-color:var(--brass); box-shadow:0 0 14px rgba(212,160,23,.35);}
  #sens{accent-color:var(--brass);}
  label{font-size:11px; color:var(--dim); letter-spacing:1px; display:flex;
    flex-direction:column; gap:4px; align-items:center;}

  @media (max-width:640px){
    #controls label{display:none;}
    .line{font-size:13px;}
  }
  @media (prefers-reduced-motion:reduce){
    #cutout.up{animation:none;}
    #lamp.busy{animation:none;}
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="stars"></canvas>
  <div id="porthole"></div>
  <div id="wall"></div>

  <div id="crowWrap">
    <!-- Comic Crow: gold lacrosse-cage crown, black eye visor with drifting
         yellow eyes, and a hinged snout/jaw that still follows speech amplitude. -->
    <svg viewBox="0 0 420 540" xmlns="http://www.w3.org/2000/svg" aria-label="Crow T. Robot">
      <defs>
        <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">

          <!-- Lacrosse-mask crown from the comic silhouette. It rides with the head

          <!-- Upper bowling-pin half. JS rotates this around the hinge as Crow talks. -->

            <path d="M232 247 C 269 228, 354 232, 396 270" fill="none"

            <circle cx="180" cy="211" r="31" fill="url(#eyeGlow)" stroke="#2b1d08" stroke-width="2"/>

              <rect x="169" y="200" width="22" height="22" rx="2" transform="rotate(45 180 211)" fill="#070605"/>
              <circle cx="172" cy="203" r="3.8" fill="#fffdf2" opacity=".96"/>
            </g>

              <rect x="231" y="200" width="22" height="22" rx="2" transform="rotate(45 242 211)" fill="#070605"/>

  <!-- cardboard cutout background gag -->
  <div id="cutout">
    <div class="label" id="cutoutLabel">SERVO (BUDGET CUT)</div>
    <svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
      <!-- popsicle stick -->
      <rect x="94" y="180" width="12" height="140" fill="#3a2d18"/>
      <!-- silhouette drawn by JS into #cutoutShape -->

<div id="console">
  <div id="readout">
    <div id="statusRow">
      <div id="lamp"></div>
      <div id="status">POWERED DOWN</div>
    </div>
    <div class="line" id="lineYou"><span class="who"></span><span id="youText"></span></div>
    <div class="line" id="lineCrow"><span class="who"></span><span id="crowText"></span></div>
  </div>
  <div id="controls">
    <label>MIC SENS
      <input id="sens" type="range" min="0.5" max="2" step="0.05" value="1">
    </label>
    <button id="reset" type="button">RESET</button>
    <button id="power" type="button">POWER</button>
  </div>
</div>

<script>
"use strict";

// ============================================================================
// tiny helpers
// ============================================================================
const $ = (id) => document.getElementById(id);
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const rand = (lo, hi) => lo + Math.random() * (hi - lo);

// ============================================================================
// star field
// ============================================================================
const starsCanvas = $("stars");
const sctx = starsCanvas.getContext("2d");
let stars = [];
const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function seedStars() {
  starsCanvas.width = innerWidth;
  starsCanvas.height = innerHeight;
  stars = [];
  const n = Math.floor((innerWidth * innerHeight) / 6500);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * innerWidth,
      y: Math.random() * innerHeight,
      r: rand(0.4, 1.6),
      p: Math.random() * Math.PI * 2,
      s: rand(0.3, 1.2),
    });
  }
}
function drawStars(t) {
  sctx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  for (const st of stars) {
    const tw = reducedMotion ? 0.75 : 0.55 + 0.45 * Math.sin(t / 900 * st.s + st.p);
    sctx.globalAlpha = tw * 0.8;
    sctx.fillStyle = "#cfd8ea";
    sctx.beginPath();
    sctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
    sctx.fill();
  }
  sctx.globalAlpha = 1;
}
addEventListener("resize", seedStars);
seedStars();

// ============================================================================
// crow puppet animation
// ============================================================================
const head = $("head");
const beak = $("beak");
const jaw = $("jaw");
const browL = $("browL"), browR = $("browR");
const pupilL = $("pupilL"), pupilR = $("pupilR");
const lidL = $("lidL"), lidR = $("lidR");

const BEAK_PIVOT = { x: 220, y: 267 };
const BEAK_REST = 0; // upper bowling-pin half rests level; voice animation lifts it open

let openTarget = 0; // 0 closed .. 1 open
let openNow = 0;
let speakAmp = 0;
let blinkUntil = 0;
let nextBlink = performance.now() + rand(1800, 5200);

function animate(t) {
  // blink
  if (t > nextBlink) { blinkUntil = t + 120; nextBlink = t + rand(2000, 6200); }
  const lidH = t < blinkUntil ? 52 : 0;
  lidL.setAttribute("height", lidH);
  lidR.setAttribute("height", lidH);

  // pupil wander (calmer while speaking)
  const wander = state === "SPEAKING" ? 1.6 : 3.5;
  const px = (Math.sin(t / 1700) * wander).toFixed(2);
  const py = (Math.cos(t / 2300) * wander * 0.6).toFixed(2);
  pupilL.setAttribute("transform", `translate(${px} ${py})`);
  pupilR.setAttribute("transform", `translate(${px} ${py})`);

  // mouth opens with speech amplitude — the jaw drops, beak bobs slightly
  openTarget = state === "SPEAKING" ? clamp(speakAmp * 8, 0.12, 1) : 0;
  openNow += (openTarget - openNow) * 0.45;
  jaw.setAttribute("transform", `translate(0 ${(openNow * 22).toFixed(2)})`);
  const beakAngle = (BEAK_REST - openNow * 6).toFixed(2);
  beak.setAttribute("transform", `rotate(${beakAngle} ${BEAK_PIVOT.x} ${BEAK_PIVOT.y})`);

  // brows lift as he talks
  const browLift = (-openNow * 6).toFixed(2);
  browL.setAttribute("transform", `translate(0 ${browLift})`);
  browR.setAttribute("transform", `translate(0 ${browLift})`);

  // idle bob + subtle tilt
  const bob = reducedMotion ? 0 : Math.sin(t / 1100) * 3;
  const tilt = reducedMotion ? 0 : Math.sin(t / 2600) * 1.5;
  head.setAttribute("transform", `translate(0 ${bob.toFixed(2)}) rotate(${tilt.toFixed(2)} 210 220)`);

  drawStars(t);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ============================================================================
// cardboard cutout gags
// ============================================================================
const SHAPES = {
  servo: { label: "SERVO (BUDGET CUT)", d:
    "M100 40 a38 34 0 1 1 -0.1 0 M62 74 h76 l10 40 q-48 22 -96 0 z M70 118 l-6 60 h72 l-6 -60 M58 182 q42 26 84 0 l8 26 q-50 24 -100 0 z" },
  host: { label: "THE HOST (CARDBOARD)", d:
    "M100 34 a30 34 0 1 1 -0.1 0 M74 96 q26 -14 52 0 l22 20 q8 40 4 68 h-104 q-4 -28 4 -68 z" },
  gypsy: { label: "GYPSY (ON BREAK)", d:
    "M64 60 q36 -30 78 -4 q14 10 6 26 l-70 22 q-22 4 -22 -18 z M96 100 q-14 46 -8 84 h28 q6 -38 -4 -84 z" },
};
const cutout = $("cutout");
const cutoutShape = $("cutoutShape");
const cutoutLabel = $("cutoutLabel");

function scheduleGag() {
  setTimeout(() => {
    if (state === "LISTENING") {
      const keys = Object.keys(SHAPES);
      const pick = SHAPES[keys[Math.floor(Math.random() * keys.length)]];
      cutoutShape.innerHTML = `<path d="${pick.d}"/>`;
      cutoutLabel.textContent = pick.label;
      cutout.classList.add("up");
      setTimeout(() => cutout.classList.remove("up"), rand(3500, 4800));
    }
    scheduleGag();
  }, rand(40000, 110000));
}

// ============================================================================
// state machine + console readout
// ============================================================================
let state = "OFF"; // OFF, CALIBRATING, LISTENING, RECORDING, THINKING, SPEAKING
const lamp = $("lamp"), statusEl = $("status");
const youText = $("youText"), crowText = $("crowText");
document.querySelector("#lineYou .who").textContent = "YOU   › ";
document.querySelector("#lineCrow .who").textContent = "CROW  › ";

const THINKING_QUIPS = [
  "consulting deep space (and one search engine)…",
  "cogitating with all seven billion parameters…",
  "hold on, the satellite runs on dial-up…",
  "thinking. it hurts. stand by…",
];
let quipTimer = null;

function setState(s) {
  state = s;
  clearInterval(quipTimer);
  lamp.className = "";
  switch (s) {
    case "OFF":         statusEl.textContent = "POWERED DOWN"; break;
    case "CALIBRATING": statusEl.textContent = "calibrating mic — shh for a second"; lamp.className = "busy"; break;
    case "LISTENING":   statusEl.textContent = "listening…"; lamp.className = "ok"; break;
    case "RECORDING":   statusEl.textContent = "go on…"; lamp.className = "ok"; break;
    case "SPEAKING":    statusEl.textContent = "riffing"; lamp.className = "busy"; break;
    case "THINKING": {
      lamp.className = "busy";
      let i = Math.floor(Math.random() * THINKING_QUIPS.length);
      statusEl.textContent = THINKING_QUIPS[i];
      quipTimer = setInterval(() => {
        i = (i + 1) % THINKING_QUIPS.length;
        statusEl.textContent = THINKING_QUIPS[i];
      }, 2600);
      break;
    }
  }
}

let typeTimer = null;
function typeOut(el, text) {
  clearInterval(typeTimer);
  el.textContent = "";
  let i = 0;
  typeTimer = setInterval(() => {
    el.textContent = text.slice(0, ++i);
    if (i >= text.length) clearInterval(typeTimer);
  }, 16);
}

// ============================================================================
// microphone: hands-free voice activity detection
// ============================================================================
let audioCtx = null, micStream = null, processor = null, srcNode = null, muteGain = null;
let ambient = 0.004;
let sensMult = 1;
$("sens").addEventListener("input", (e) => { sensMult = parseFloat(e.target.value); });

const preroll = [];         // ring buffer of recent chunks
const PREROLL_CHUNKS = 8;
let recChunks = [];
let voicedRun = 0;
let silenceMs = 0;
let recStartT = 0;
let chunkMs = 0;

function threshold() { return Math.max(0.010, ambient * 3.5) / sensMult; }

function rmsOf(buf) {
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
  return Math.sqrt(sum / buf.length);
}

async function powerOn() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
  });
  srcNode = audioCtx.createMediaStreamSource(micStream);
  processor = audioCtx.createScriptProcessor(2048, 1, 1);
  muteGain = audioCtx.createGain();
  muteGain.gain.value = 0; // hear nothing back, but keeps the node alive
  srcNode.connect(processor);
  processor.connect(muteGain);
  muteGain.connect(audioCtx.destination);
  chunkMs = (2048 / audioCtx.sampleRate) * 1000;

  // calibrate ambient noise
  setState("CALIBRATING");
  const samples = [];
  const calHandler = (e) => samples.push(rmsOf(e.inputBuffer.getChannelData(0)));
  processor.addEventListener("audioprocess", calHandler);
  await new Promise((res) => setTimeout(res, 1300));
  processor.removeEventListener("audioprocess", calHandler);
  samples.sort((a, b) => a - b);
  ambient = samples.length ? samples[Math.floor(samples.length / 2)] : 0.004;

  processor.addEventListener("audioprocess", onAudio);
  setState("LISTENING");
  typeOut(crowText, "Oh good, it's on. Say something — I dare you.");
  scheduleGag();
}

function powerOff() {
  try {
    if (processor) processor.removeEventListener("audioprocess", onAudio);
    if (micStream) micStream.getTracks().forEach((t) => t.stop());
    if (audioCtx) audioCtx.close();
  } catch (e) { /* it's dead, jim */ }
  audioCtx = null; micStream = null; processor = null;
  recChunks = []; preroll.length = 0;
  setState("OFF");
}

function onAudio(e) {
  if (state !== "LISTENING" && state !== "RECORDING") return;
  const data = e.inputBuffer.getChannelData(0);
  const copy = new Float32Array(data); // buffer is reused by the browser
  const level = rmsOf(copy);

  preroll.push(copy);
  if (preroll.length > PREROLL_CHUNKS) preroll.shift();

  if (state === "LISTENING") {
    if (level > threshold()) {
      voicedRun++;
      if (voicedRun >= 3) {
        recChunks = preroll.slice();
        recStartT = performance.now();
        silenceMs = 0;
        setState("RECORDING");
      }
    } else {
      voicedRun = 0;
    }
  } else if (state === "RECORDING") {
    recChunks.push(copy);
    if (level > threshold()) silenceMs = 0;
    else silenceMs += chunkMs;

    const dur = performance.now() - recStartT;
    if (silenceMs > 800 || dur > 15000) {
      voicedRun = 0;
      if (dur - silenceMs < 350) {
        recChunks = [];
        setState("LISTENING"); // too short — probably a chair creak
      } else {
        finishUtterance();
      }
    }
  }
}

// ============================================================================
// wav encoding (down to 16 kHz mono, 16-bit — what whisper wants)
// ============================================================================
function mergeChunks(chunks) {
  let len = 0;
  for (const c of chunks) len += c.length;
  const out = new Float32Array(len);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

function downsampleTo16k(f32, srcRate) {
  const ratio = srcRate / 16000;
  const n = Math.floor(f32.length / ratio);
  const out = new Float32Array(n);
  for (let i = 0; i < n; i++) out[i] = f32[Math.floor(i * ratio)];
  return out;
}

function encodeWAV(f32) {
  const buf = new ArrayBuffer(44 + f32.length * 2);
  const v = new DataView(buf);
  const wstr = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  wstr(0, "RIFF"); v.setUint32(4, 36 + f32.length * 2, true); wstr(8, "WAVE");
  wstr(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, 1, true); v.setUint32(24, 16000, true);
  v.setUint32(28, 32000, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  wstr(36, "data"); v.setUint32(40, f32.length * 2, true);
  let o = 44;
  for (let i = 0; i < f32.length; i++, o += 2) {
    const s = clamp(f32[i], -1, 1);
    v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7fff, true);
  }
  return buf;
}

// ============================================================================
// the round trip: transcribe → think → speak
// ============================================================================
function b64ToBuf(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function finishUtterance() {
  setState("THINKING");
  const merged = mergeChunks(recChunks);
  recChunks = [];
  const wav = encodeWAV(downsampleTo16k(merged, audioCtx.sampleRate));

  try {
    const tr = await fetch("/api/transcribe", {
      method: "POST",
      headers: { "Content-Type": "application/octet-stream" },
      body: wav,
    });
    const tj = await tr.json();
    if (tj.error) throw new Error(tj.error);
    const heard = (tj.text || "").trim();
    if (!heard) {
      statusEl.textContent = "just static… go again";
      setTimeout(() => { if (state === "THINKING") setState("LISTENING"); }, 900);
      return;
    }
    typeOut(youText, heard);

    const rr = await fetch("/api/reply", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: heard }),
    });
    const rj = await rr.json();
    if (rj.error && !rj.reply) throw new Error(rj.error);

    typeOut(crowText, rj.reply || "…");
    if (rj.tools && rj.tools.length) {
      statusEl.textContent = "checked the web for that one";
    }
    if (rj.audio) {
      await playCrow(b64ToBuf(rj.audio));
    } else {
      setTimeout(() => setState("LISTENING"), 600);
    }
  } catch (err) {
    typeOut(crowText, "My brain fell out. Check the terminal running ./crow — " + err.message);
    setState("LISTENING");
  }
}

async function playCrow(arrayBuf) {
  const audio = await audioCtx.decodeAudioData(arrayBuf);
  const src = audioCtx.createBufferSource();
  src.buffer = audio;
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  const data = new Uint8Array(analyser.fftSize);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  setState("SPEAKING");
  let alive = true;
  function meter() {
    if (!alive) return;
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const d = (data[i] - 128) / 128;
      sum += d * d;
    }
    speakAmp = Math.sqrt(sum / data.length);
    requestAnimationFrame(meter);
  }
  meter();

  src.start();
  await new Promise((res) => { src.onended = res; });
  alive = false;
  speakAmp = 0;
  setTimeout(() => setState("LISTENING"), 350); // don't let him hear his own echo
}

// ============================================================================
// controls
// ============================================================================
$("power").addEventListener("click", async () => {
  const btn = $("power");
  if (state === "OFF") {
    btn.classList.add("on");
    try {
      await powerOn();
    } catch (err) {
      btn.classList.remove("on");
      setState("OFF");
      statusEl.textContent = "mic blocked — allow microphone access and try again";
    }
  } else {
    btn.classList.remove("on");
    powerOff();
  }
});

$("reset").addEventListener("click", async () => {
  try { await fetch("/api/reset", { method: "POST" }); } catch (e) { /* fine */ }
  youText.textContent = "";
  typeOut(crowText, "Memory wiped. Who are you? Who am I? Ah well.");
});
</script>
